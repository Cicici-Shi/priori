<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>highlight-to-learn</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <!-- 左：深色侧边栏（品牌 + 章节目录） -->
    <nav id="sidebar">
      <div class="brand">
        <span class="prompt-dot"></span>
        <span class="brand-name">highlight-to-learn</span>
        <button id="settings-btn" class="icon-btn ghost-dark" title="设置 / 导入">[cfg]</button>
      </div>
      <div id="doc-title" class="doc-title" title=""></div>

      <div id="settings-pop" class="settings-pop" hidden>
        <div class="set-row">
          <input id="url-input" type="text" placeholder="url…" />
          <label class="icon-btn file-label" title="上传字幕或音视频文件">
            <svg viewBox="0 0 24 24" width="15" height="15"><path fill="currentColor" d="M12 16a1 1 0 0 0 1-1V7.41l2.3 2.3a1 1 0 0 0 1.4-1.42l-4-4a1 1 0 0 0-1.4 0l-4 4A1 1 0 0 0 8.7 9.7L11 7.41V15a1 1 0 0 0 1 1Zm7 2H5a1 1 0 0 0 0 2h14a1 1 0 0 0 0-2Z"/></svg>
            <input id="file-input" type="file"
                   accept=".srt,.vtt,.txt,.md,.mp3,.mp4,.m4a,.wav,.aac,.flac,.ogg,.webm,.mov,.mkv" hidden />
          </label>
          <button id="url-btn" class="primary">run</button>
        </div>
        <div class="set-row">
          <select id="backend-select" class="ghost-select" title="问答引擎">
            <option value="">engine: default</option>
            <option value="claude">engine: claude</option>
            <option value="codex">engine: codex</option>
          </select>
          <span id="ingest-status" class="status"></span>
        </div>
        <div class="set-row">
          <label class="set-check"><input type="checkbox" id="translate-toggle" /> 整段中文翻译（并行）</label>
        </div>
        <div class="set-row">
          <label class="set-check"><input type="checkbox" id="subtitle-toggle" /> 逐句双语对照（字幕式）</label>
        </div>
        <div class="set-row">
          <label class="set-check"><input type="checkbox" id="hide-video-toggle" /> 隐藏视频（保留播放控制）</label>
        </div>
        <div id="read-toolbar" class="read-toolbar" hidden>
          <div class="seg-toggle">
            <button id="mode-raw" class="active">原文</button>
            <button id="mode-clean">清洗口水词</button>
          </div>
        </div>
      </div>

      <div class="sidebar-head">
        <span class="summary-title">./notes</span>
        <span class="head-btns">
          <button id="notes-export" class="icon-btn ghost-dark" title="导出 Markdown">⤓</button>
          <button id="summary-refresh" class="icon-btn ghost-dark" title="重新生成">↻</button>
        </span>
      </div>
      <div id="summary-body" class="summary-body">
        <div class="sidebar-empty">$ 等待输入源…<br/>点右上 [cfg] 粘贴链接或上传文件。</div>
      </div>
    </nav>

    <div class="col-resize" id="rz-left" title="拖动调整侧栏宽度"></div>

    <!-- 右侧工作区 -->
    <div class="workspace">
      <main>
        <!-- 中：字幕 -->
        <section id="content-pane">
          <div id="video-pane" class="video-pane" hidden>
            <div id="vid-ctrl" class="vid-ctrl">
              <button id="vid-play" class="vid-btn" title="播放 / 暂停（空格）"><svg viewBox="0 0 24 24" width="11" height="11"><path fill="currentColor" d="M8 5v14l11-7z"/></svg></button>
              <span id="vid-cur" class="vid-time">0:00</span>
              <input id="vid-seek" class="vid-seek" type="range" min="0" max="100" value="0" step="0.1" title="进度" />
              <span id="vid-dur" class="vid-time">0:00</span>
              <select id="vid-rate" class="vid-rate" title="播放速度（Shift+> / Shift+<）">
                <option value="0.25">0.25×</option>
                <option value="0.5">0.5×</option>
                <option value="0.75">0.75×</option>
                <option value="1" selected>1×</option>
                <option value="1.25">1.25×</option>
                <option value="1.5">1.5×</option>
                <option value="1.75">1.75×</option>
                <option value="2">2×</option>
              </select>
            </div>
            <div class="video-frame"><div id="yt-player"></div></div>
            <div id="video-resize" class="video-resize" title="拖动调整视频高度"></div>
          </div>
          <div id="speaker-bar" class="speaker-bar" hidden></div>

          <div id="transcript" class="transcript empty">
            <pre class="boot">highlight-to-learn v0.1.0  ·  opus-4.8
[ok] runtime ready
[ok] cache warm
[--] no source loaded

$ open [cfg] → paste a url or upload a file</pre>
          </div>
        </section>

        <div class="col-resize" id="rz-right" title="拖动调整对话栏宽度"></div>

        <!-- 右：对话 -->
        <aside id="chat-pane">
          <div class="chat-header">
            <span>对话</span>
            <button id="new-session" class="new-session-btn" title="开新会话：不再背旧上下文缓存，更省（历史仍保留显示）">+ 新对话</button>
          </div>
          <div id="chat" class="chat"></div>
          <div id="chat-input-bar">
            <textarea id="chat-input" rows="3"
                      placeholder="继续追问，无需选中（如“上一个回答没听懂，再讲细点”）…"></textarea>
            <div class="composer-foot">
              <span class="composer-hint">回车发送 · Shift+Enter 换行</span>
              <button id="chat-send" class="primary send-btn" title="发送（回车）">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3.4 20.4l17.45-7.48a1 1 0 0 0 0-1.84L3.4 3.6a1 1 0 0 0-1.39 1.2L4 11l9 1l-9 1l-2 6.2a1 1 0 0 0 1.4 1.2Z"/></svg>
                <span>发送</span>
              </button>
            </div>
          </div>
        </aside>
      </main>
    </div>
  </div>

  <!-- 选区浮动按钮 -->
  <button id="ask-float" hidden>[ ask ↵ ]</button>

  <!-- 提问输入框 -->
  <div id="ask-box" hidden>
    <div class="ask-selected" id="ask-selected"></div>
    <textarea id="ask-input" rows="2" placeholder="针对选中内容提问，回车发送 · Shift+Enter 换行…"></textarea>
    <div class="ask-actions">
      <button id="ask-cancel" class="ghost">取消</button>
      <button id="ask-send" class="primary">发送</button>
    </div>
  </div>

  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/purify.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
